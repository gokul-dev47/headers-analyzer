name: Activity Updater

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update timestamp
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          LAST=$(git log -1 --format="%ci" | cut -d' ' -f1)
          DAYS=$(( ( $(date -d "$TODAY" +%s) - $(date -d "$LAST" +%s) ) / 86400 ))
          if [ "$DAYS" -ge 2 ]; then
            echo "Last updated: $(date -u)" > .last-updated
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .last-updated
            git commit -m "chore: activity update [$(date -u +%Y-%m-%d)]"
            git push
          fi
